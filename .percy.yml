# Percy Visual Testing Configuration
# https://docs.percy.io/docs/configuration

version: 2

snapshot:
  # Viewport widths for responsive testing
  widths: [375, 768, 1280, 1920]

  # Wait for animations to settle before snapshotting
  # Prevents false positives from mid-animation captures
  percy-css: |
    * {
      animation-duration: 0s !important;
      animation-delay: 0s !important;
      transition-duration: 0s !important;
      transition-delay: 0s !important;
    }

  # Enable accessibility testing
  enable-javascript: true

  # Wait for network to be idle (prevents race conditions)
  # Percy waits for 750ms of network idle before capturing
  # This allows time for Next.js to serve all CSS/font files
  network-idle-timeout: 750

# Asset discovery - allows Percy to capture resources from localhost
# Required for Next.js dev server assets (CSS, fonts, images)
discovery:
  allowed-hostnames:
    - localhost
    - 127.0.0.1
  network-idle-timeout: 750
  disable-cache: false

# Debugging
# https://docs.percy.io/docs/debugging-sdks
# PERCY_DEBUG=*   (set as env var to see verbose logs)
