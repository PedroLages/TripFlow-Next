<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Create New Trip</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Blurred Dashboard Background Context -->
<div class="fixed inset-0 z-0 flex flex-col p-8 filter blur-md opacity-50 select-none pointer-events-none">
<!-- Header Mock -->
<header class="flex justify-between items-center mb-8">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-icons">travel_explore</span>
</div>
<h1 class="text-2xl font-bold tracking-tight">TripOS</h1>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
</header>
<!-- Grid Mock -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-64 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 p-4">
<div class="w-full h-32 bg-slate-100 dark:bg-slate-800 rounded-lg mb-4"></div>
<div class="h-4 w-3/4 bg-slate-100 dark:bg-slate-800 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-100 dark:bg-slate-800 rounded"></div>
</div>
<div class="h-64 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 p-4">
<div class="w-full h-32 bg-slate-100 dark:bg-slate-800 rounded-lg mb-4"></div>
<div class="h-4 w-3/4 bg-slate-100 dark:bg-slate-800 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-100 dark:bg-slate-800 rounded"></div>
</div>
<div class="h-64 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 p-4">
<div class="w-full h-32 bg-slate-100 dark:bg-slate-800 rounded-lg mb-4"></div>
<div class="h-4 w-3/4 bg-slate-100 dark:bg-slate-800 rounded mb-2"></div>
<div class="h-4 w-1/2 bg-slate-100 dark:bg-slate-800 rounded"></div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
<!-- Modal Content Container -->
<div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Create a New Trip</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Start planning your next collective adventure.</p>
</div>
<!-- Form Body -->
<form class="px-8 pb-8 space-y-5">
<!-- Trip Name -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="trip-name">Trip Name</label>
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="trip-name" name="trip-name" placeholder="e.g. Summer Adventure" type="text"/>
</div>
<!-- Destination -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="destination">Where to?</label>
<div class="relative">
<span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-primary">map</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="destination" name="destination" placeholder="Select destination" type="text"/>
</div>
</div>
<!-- Date Range -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="start-date">Start Date</label>
<div class="relative">
<span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">calendar_today</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="start-date" name="start-date" type="date"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="end-date">End Date</label>
<div class="relative">
<span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">event</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="end-date" name="end-date" type="date"/>
</div>
</div>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="description">Description (Optional)</label>
<textarea class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400 resize-none" id="description" name="description" placeholder="Tell your friends what this trip is about..." rows="3"></textarea>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-800 mt-6">
<button class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-6 py-2.5 bg-primary hover:bg-primary/90 text-white rounded-lg text-sm font-semibold shadow-lg shadow-primary/20 transition-all active:scale-95" type="submit">
                        Create Trip
                    </button>
</div>
</form>
</div>
</div>
<!-- Background Illustration Elements -->
<div class="fixed top-0 right-0 -z-10 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
</body></html>
