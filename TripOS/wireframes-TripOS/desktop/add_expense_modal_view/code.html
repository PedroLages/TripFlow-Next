<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Expense - TripOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for the modal content */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2d3748;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-0"></div>
<!-- Add Expense Modal -->
<div class="relative z-10 w-full max-w-xl bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
<h2 class="text-xl font-bold text-slate-900 dark:text-white">Add Expense</h2>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
<span class="material-icons text-xl leading-none">close</span>
</button>
</div>
<!-- Modal Content (Scrollable) -->
<form class="p-6 max-h-[85vh] overflow-y-auto custom-scrollbar">
<!-- Amount Input -->
<div class="mb-8 text-center">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Total Amount</label>
<div class="relative inline-block w-full max-w-xs">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-semibold text-slate-400">$</span>
<input class="w-full pl-10 pr-4 py-3 text-4xl font-bold text-center border-none focus:ring-0 bg-transparent text-slate-900 dark:text-white placeholder-slate-200 dark:placeholder-slate-700" placeholder="0.00" step="0.01" type="number"/>
<div class="h-0.5 w-full bg-slate-100 dark:bg-slate-800 absolute bottom-0 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/2"></div> <!-- Visual focus hint -->
</div>
</div>
</div>
<!-- Description -->
<div class="mb-6">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Description <span class="text-red-500">*</span></label>
<input class="w-full px-4 py-2.5 rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" placeholder="e.g. Group Dinner at La Marina" required="" type="text"/>
</div>
<!-- Category Pill Selector -->
<div class="mb-6">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2.5">Category</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white border border-primary transition-colors" type="button">
                        Food
                    </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-transparent hover:border-slate-300 dark:hover:border-slate-600 transition-colors" type="button">
                        Activity
                    </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-transparent hover:border-slate-300 dark:hover:border-slate-600 transition-colors" type="button">
                        Transport
                    </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-transparent hover:border-slate-300 dark:hover:border-slate-600 transition-colors" type="button">
                        Accommodation
                    </button>
<button class="px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-transparent hover:border-slate-300 dark:hover:border-slate-600 transition-colors" type="button">
                        Other
                    </button>
</div>
</div>
<!-- Payment & Currency Grid -->
<div class="grid grid-cols-2 gap-4 mb-6">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Paid by</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-2.5 rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
<option>You (Alex)</option>
<option>Sarah Johnson</option>
<option>Mike Chen</option>
<option>Taylor Swift</option>
</select>
<span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Currency</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-2.5 rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
<option selected="">USD ($)</option>
<option>EUR (€)</option>
<option>GBP (£)</option>
<option>JPY (¥)</option>
</select>
<span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Split Logic -->
<div class="mb-6 p-4 rounded-lg bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between mb-4">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">How to split?</span>
<div class="flex bg-slate-200 dark:bg-slate-700 p-1 rounded-md">
<button class="px-3 py-1 text-xs font-medium rounded text-slate-600 dark:text-slate-400" type="button">Equally</button>
<button class="px-3 py-1 text-xs font-medium rounded bg-white dark:bg-slate-600 text-primary dark:text-white shadow-sm" type="button">Custom</button>
</div>
</div>
<!-- Custom Split List -->
<div class="space-y-3">
<!-- Member Row 1 -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-xs font-bold text-primary border border-primary/20">A</div>
<span class="text-sm text-slate-700 dark:text-slate-300">Alex (You)</span>
</div>
<div class="relative w-28">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">$</span>
<input class="w-full pl-7 pr-3 py-1.5 text-right text-sm rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white" type="text" value="0.00"/>
</div>
</div>
<!-- Member Row 2 -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-xs font-bold text-orange-600 border border-orange-200">S</div>
<span class="text-sm text-slate-700 dark:text-slate-300">Sarah Johnson</span>
</div>
<div class="relative w-28">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">$</span>
<input class="w-full pl-7 pr-3 py-1.5 text-right text-sm rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white" type="text" value="0.00"/>
</div>
</div>
<!-- Member Row 3 -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-xs font-bold text-green-600 border border-green-200">M</div>
<span class="text-sm text-slate-700 dark:text-slate-300">Mike Chen</span>
</div>
<div class="relative w-28">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">$</span>
<input class="w-full pl-7 pr-3 py-1.5 text-right text-sm rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white" type="text" value="0.00"/>
</div>
</div>
</div>
<!-- Split Summary -->
<div class="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center text-xs">
<span class="text-slate-500">Remaining to assign:</span>
<span class="font-bold text-slate-900 dark:text-white">$ 0.00</span>
</div>
</div>
<!-- Optional: Link to activity -->
<div class="mb-4">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Link to activity (Optional)</label>
<div class="relative">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">link</span>
<select class="w-full appearance-none pl-10 pr-4 py-2.5 rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
<option>None</option>
<option>Dinner at the Beachfront</option>
<option>Guided City Tour</option>
<option>Airport Shuttle Transfer</option>
</select>
<span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
</form>
<!-- Footer -->
<div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row gap-3">
<button class="w-full sm:w-1/3 px-6 py-3 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-colors order-2 sm:order-1" type="button">
                Cancel
            </button>
<button class="w-full sm:flex-1 px-6 py-3 text-sm font-semibold text-white bg-primary hover:bg-primary/90 rounded shadow-lg shadow-primary/25 transition-all order-1 sm:order-2" type="button">
                Save Expense
            </button>
</div>
</div>

```</body></html>
