<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | TripOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4">
<span class="material-icons text-white text-3xl">flight_takeoff</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">TripOS</h1>
</div>
<!-- Password Reset Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-8">
<div class="mb-6">
<h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Reset your password</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    Enter the email address associated with your account and we'll send you a link to reset your password.
                </p>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Input Field -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 group-focus-within:text-primary transition-colors text-xl">mail_outline</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg shadow-md shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
<span>Send Reset Link</span>
</button>
</form>
<!-- Back to Sign In Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<a class="inline-flex items-center text-sm font-medium text-primary hover:text-primary/80 transition-colors group" href="#">
<span class="material-icons text-sm mr-1.5 transform group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Back to Sign In
                </a>
</div>
</div>
<!-- Additional Help / Illustration Background (Abstract Decor) -->
<div class="mt-12 opacity-50 flex justify-center gap-4">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/40"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
<!-- Support Text -->
<p class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-medium">
            © 2024 TripOS Collaborative Travel
        </p>
</div>
<!-- Decorative Elements (Fixed positions for desktop depth) -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/10 via-primary to-primary/10"></div>
<div class="hidden lg:block fixed -bottom-20 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
<div class="hidden lg:block fixed -top-20 -right-20 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>
<div class="sr-only">
<!-- Abstract background image description -->
<img alt="Abstract gradient" data-alt="Soft abstract blue gradient background pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvCe-hPnexsuD7UTbY316A6hhygUlQz5VgxlHew-VwOK4PLZG4fQjzXXS8Hdn0vLrb_LFgeLGxL3AVQS2FefJednfykYI7OUqXvyfgi9yCCbruuL_VylzyGz8teKjoaBtMV30cO4uMWw2eja_8xbQx2SGg6eAln0ZIyzvhWtXT5Rnbtb64m5BULqzAAAWrDtfXWJTiQ0Ofn4NToovES0qJGG5rbMvlOzXzV-zWYovzV0pSgFoz8H4P30artGxGYSMg_t9w2IRP8Jc"/>
</div>
</body></html>
