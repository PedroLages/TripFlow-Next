<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - TripOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">
<!-- Logo & Branding -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-xl mb-4 text-white shadow-lg shadow-primary/20">
<span class="material-symbols-rounded text-3xl">flight_takeoff</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">TripOS</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium">Plan group trips without the awkwardness</p>
</div>
<!-- Main Card -->
<div class="bg-white dark:bg-slate-900/50 dark:border dark:border-slate-800 p-8 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none">
<div class="mb-8">
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Create your account</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Join 50,000+ travelers planning together.</p>
</div>
<!-- Social Logins -->
<div class="space-y-3 mb-6">
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors duration-200 text-sm font-medium text-slate-700 dark:text-slate-200">
<img alt="" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaIbF33ohP4fj5Z7EL668e5Tj1bhVkzbgejm0srkGgIUjQjVXa7ecNCyny-EEH-vmw6EvhT-AhitwOtBpSOTvYuIAOVFJerO1QyAaJaxmZKx-TWe5T0P2cXfHRWWsyXbfei9bYnUE8ZaYL_IZCuk05_-kUpyj77AtRs1wp0X2G3T-imh3opwvBr9_2RTCFWPUvjahRfhmjV3h3wtVLhrb9POc7IA31ZnuaFFQUhj8l3wDepTKhUnRZz6YB-7YpFpZ8Y5gZj3Iw30w"/>
                    Continue with Google
                </button>
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 bg-black text-white rounded-lg hover:bg-slate-800 transition-colors duration-200 text-sm font-medium">
<span class="material-symbols-rounded text-lg">apple</span>
                    Continue with Apple
                </button>
</div>
<!-- Divider -->
<div class="relative mb-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-3 text-slate-400 font-medium tracking-wider">Or</span>
</div>
</div>
<!-- Form -->
<form action="#" class="space-y-5">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full pl-10 pr-10 py-2.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-rounded text-lg">visibility</span>
</button>
</div>
<p class="text-[11px] text-slate-400 mt-1 px-1">Must be at least 8 characters with one number.</p>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 rounded-lg shadow-lg shadow-primary/20 transition-all duration-200 transform active:scale-[0.98]" type="submit">
                    Create Account
                </button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Sign in</a>
</p>
</div>
</div>
<!-- Footer Caption -->
<div class="mt-8 text-center px-6">
<p class="text-xs text-slate-400 dark:text-slate-500 leading-relaxed">
                By signing up, you agree to our 
                <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Terms of Service</a> 
                and 
                <a class="underline hover:text-slate-600 dark:hover:text-slate-300" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Floating Background Elements (Abstract Decor) -->
<div class="fixed top-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 -right-20 w-80 h-80 bg-primary/10 rounded-full blur-3xl -z-10"></div>
</div>
<!-- Background Decorative Image (Hidden on Mobile) -->
<div class="hidden lg:block fixed top-10 right-10 opacity-20 -z-10">
<img alt="" class="w-96 h-auto rounded-xl rotate-3" data-alt="Abstract travel map and camera collage" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBNTpEslkYFR_1XusUlwY1DYCi2btRLeMWMxhJ5-nsJ9Ev_wjIaurRV7oajU1oKs_6jHJrwN4B8mbeVWmUOaef3yv1NwYussCIQVej-Qh4yIHzOfgOAmMTTCN_PKo1Y7IbcMdsDWedsO3q8xW5PBJ2LSLb5JhCsgr_8TB7Hb7ZYZ0IjwKeXGwI_nb6EKau-dk39zZ893HhyuR0IBWJ39UfqHNYqlMKl1lsLLYWk0TQbQqB4OjB0mj9NsN9igu659tzCG8GYikQaYg"/>
</div>
</body></html>
