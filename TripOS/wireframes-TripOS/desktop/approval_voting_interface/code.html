<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Cast Your Vote</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f19e6",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191121",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<!-- Main Navigation Bar -->
<nav class="border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-icons text-xl">flight_takeoff</span>
</div>
<span class="font-bold text-xl tracking-tight">TripOS</span>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:text-primary transition-colors">
<span class="material-icons">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="text-xs font-bold text-primary">JD</span>
</div>
</div>
</div>
</nav>
<main class="max-w-2xl mx-auto px-6 py-12">
<!-- Header Section -->
<header class="mb-8">
<div class="flex items-center gap-3 mb-4">
<span class="px-3 py-1 bg-primary text-white text-xs font-bold uppercase tracking-wider rounded-full">
                    Approval Poll
                </span>
<span class="text-slate-400 dark:text-slate-500 text-sm flex items-center gap-1">
<span class="material-icons text-sm">person</span>
                    Created by Sarah J.
                </span>
</div>
<h1 class="text-3xl md:text-4xl font-bold text-slate-900 dark:text-white mb-2 leading-tight">
                Which activities are you interested in?
            </h1>
<p class="text-slate-500 dark:text-slate-400">
                Select all options you approve of. Multiple selections are allowed.
            </p>
</header>
<!-- Voting Options List -->
<div class="space-y-4 mb-10">
<!-- Option 1: Selected -->
<label class="relative block group cursor-pointer">
<input checked="" class="peer hidden" type="checkbox"/>
<div class="flex items-center justify-between p-6 bg-white dark:bg-slate-800/50 border-2 border-transparent rounded-xl shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200 hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary">
<span class="material-icons">wine_bar</span>
</div>
<div>
<h3 class="font-semibold text-lg text-slate-800 dark:text-white">Wine Tasting</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Evening tour at Chateau Valley</p>
</div>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center peer-checked:bg-primary peer-checked:border-primary transition-colors">
<span class="material-icons text-white text-lg font-bold">check</span>
</div>
</div>
</label>
<!-- Option 2: Unselected -->
<label class="relative block group cursor-pointer">
<input class="peer hidden" type="checkbox"/>
<div class="flex items-center justify-between p-6 bg-white dark:bg-slate-800/50 border-2 border-transparent rounded-xl shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200 hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-icons">hiking</span>
</div>
<div>
<h3 class="font-semibold text-lg text-slate-800 dark:text-white">Hiking</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Morning trail at Blue Peaks</p>
</div>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center peer-checked:bg-primary peer-checked:border-primary transition-colors">
<span class="material-icons text-white text-lg font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
</label>
<!-- Option 3: Unselected -->
<label class="relative block group cursor-pointer">
<input class="peer hidden" type="checkbox"/>
<div class="flex items-center justify-between p-6 bg-white dark:bg-slate-800/50 border-2 border-transparent rounded-xl shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200 hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400">
<span class="material-icons">museum</span>
</div>
<div>
<h3 class="font-semibold text-lg text-slate-800 dark:text-white">Museum Visit</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">National Gallery tour</p>
</div>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center peer-checked:bg-primary peer-checked:border-primary transition-colors">
<span class="material-icons text-white text-lg font-bold opacity-0 peer-checked:opacity-100">check</span>
</div>
</div>
</label>
<!-- Option 4: Selected -->
<label class="relative block group cursor-pointer">
<input checked="" class="peer hidden" type="checkbox"/>
<div class="flex items-center justify-between p-6 bg-white dark:bg-slate-800/50 border-2 border-transparent rounded-xl shadow-sm peer-checked:border-primary peer-checked:bg-primary/5 transition-all duration-200 hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary">
<span class="material-icons">beach_access</span>
</div>
<div>
<h3 class="font-semibold text-lg text-slate-800 dark:text-white">Beach Day</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Full day at Sunny Shores</p>
</div>
</div>
<div class="w-7 h-7 rounded-lg border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center peer-checked:bg-primary peer-checked:border-primary transition-colors">
<span class="material-icons text-white text-lg font-bold">check</span>
</div>
</div>
</label>
</div>
<!-- Footer / Action Area -->
<div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl flex items-center justify-between border border-primary/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons text-xl">playlist_add_check</span>
</div>
<div>
<span class="block text-sm text-slate-500 dark:text-slate-400">Current Selection</span>
<span class="block font-bold text-slate-900 dark:text-white text-lg">2 of 4 selected</span>
</div>
</div>
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center gap-2">
                Cast Vote
                <span class="material-icons text-sm">send</span>
</button>
</div>
<div class="mt-8 text-center">
<button class="text-slate-400 dark:text-slate-500 hover:text-slate-600 transition-colors text-sm flex items-center gap-2 mx-auto">
<span class="material-icons text-base">info</span>
                How approval voting works
            </button>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-gradient-to-bl from-primary/5 to-transparent pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-gradient-to-tr from-primary/5 to-transparent pointer-events-none"></div>
</body></html>
