<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Create Poll</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f19e6",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen relative overflow-hidden">
<!-- Mocked Background: Votes Dashboard -->
<div class="fixed inset-0 z-0 p-8 grid grid-cols-12 gap-6 blur-[2px] opacity-40 pointer-events-none">
<aside class="col-span-3 space-y-4">
<div class="h-12 w-full bg-primary/10 dark:bg-primary/20 rounded-lg"></div>
<div class="h-12 w-full bg-white dark:bg-primary/5 rounded-lg border border-primary/10"></div>
<div class="h-12 w-full bg-white dark:bg-primary/5 rounded-lg border border-primary/10"></div>
<div class="h-12 w-full bg-white dark:bg-primary/5 rounded-lg border border-primary/10"></div>
</aside>
<main class="col-span-9 space-y-6">
<div class="flex justify-between items-center">
<div class="h-10 w-48 bg-primary/20 rounded-lg"></div>
<div class="h-10 w-32 bg-primary rounded-lg"></div>
</div>
<div class="grid grid-cols-2 gap-6">
<div class="h-64 bg-white dark:bg-primary/10 rounded-xl shadow-sm"></div>
<div class="h-64 bg-white dark:bg-primary/10 rounded-xl shadow-sm"></div>
<div class="h-64 bg-white dark:bg-primary/10 rounded-xl shadow-sm"></div>
<div class="h-64 bg-white dark:bg-primary/10 rounded-xl shadow-sm"></div>
</div>
</main>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-40 bg-background-dark/60 backdrop-blur-sm flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-[#22172e] w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-xl shadow-2xl flex flex-col border border-primary/10">
<!-- Header -->
<div class="p-6 border-b border-primary/10 flex items-center justify-between sticky top-0 bg-white dark:bg-[#22172e] z-10">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 dark:bg-primary/20 rounded-lg text-primary">
<span class="material-icons">how_to_vote</span>
</div>
<h2 class="text-2xl font-bold text-background-dark dark:text-white">Create a Poll</h2>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
<span class="material-icons">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-8 space-y-8">
<!-- Poll Question -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-200">Poll Question</label>
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-background-dark dark:text-white placeholder:text-slate-400" placeholder="What should we decide?" type="text"/>
</div>
<!-- Options Section -->
<div class="space-y-4">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-200 uppercase tracking-wider">Options</label>
<span class="text-xs text-slate-400 font-medium">Add at least two options</span>
</div>
<div class="space-y-4">
<!-- Option 1 -->
<div class="relative group bg-slate-50 dark:bg-primary/5 p-4 rounded-lg border border-slate-200 dark:border-primary/20">
<div class="flex gap-4 items-start">
<div class="flex-1 space-y-3">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-background-dark dark:text-white font-medium" placeholder="Option title" type="text" value="Option 1"/>
<textarea class="w-full bg-white dark:bg-background-dark/40 border border-slate-200 dark:border-primary/20 rounded p-2 text-sm text-slate-600 dark:text-slate-300 focus:ring-1 focus:ring-primary resize-none h-16" placeholder="Small description (optional)"></textarea>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors mt-1">
<span class="material-icons text-sm">close</span>
</button>
</div>
</div>
<!-- Option 2 -->
<div class="relative group bg-slate-50 dark:bg-primary/5 p-4 rounded-lg border border-slate-200 dark:border-primary/20">
<div class="flex gap-4 items-start">
<div class="flex-1 space-y-3">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-background-dark dark:text-white font-medium" placeholder="Option title" type="text" value="Option 2"/>
<textarea class="w-full bg-white dark:bg-background-dark/40 border border-slate-200 dark:border-primary/20 rounded p-2 text-sm text-slate-600 dark:text-slate-300 focus:ring-1 focus:ring-primary resize-none h-16" placeholder="Small description (optional)"></textarea>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors mt-1">
<span class="material-icons text-sm">close</span>
</button>
</div>
</div>
</div>
<button class="flex items-center gap-2 text-primary font-semibold hover:gap-3 transition-all">
<span class="material-icons text-lg">add</span>
<span>Add Option</span>
</button>
</div>
<!-- Advanced Settings Accordion -->
<div class="border border-primary/20 rounded-lg overflow-hidden">
<div class="bg-primary/5 p-4 flex items-center justify-between cursor-pointer">
<div class="flex items-center gap-2 font-semibold text-primary">
<span class="material-icons text-lg">settings</span>
<span>Advanced Settings</span>
</div>
<span class="material-icons text-primary">expand_less</span>
</div>
<div class="p-6 space-y-8 bg-white dark:bg-[#2a1e38]">
<!-- Vote Type Radio Group -->
<div class="space-y-4">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-200">Vote Type</label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
<!-- Yes/No -->
<label class="relative flex flex-col p-4 border-2 border-primary bg-primary/5 rounded-lg cursor-pointer">
<input checked="" class="absolute top-4 right-4 text-primary focus:ring-primary h-4 w-4" name="vote_type" type="radio"/>
<span class="font-bold text-background-dark dark:text-white mb-1">Yes / No</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Simple binary choice</span>
</label>
<!-- Ranked Choice -->
<label class="relative flex flex-col p-4 border border-slate-200 dark:border-primary/20 rounded-lg cursor-pointer hover:border-primary/50">
<input class="absolute top-4 right-4 text-primary focus:ring-primary h-4 w-4" name="vote_type" type="radio"/>
<span class="font-bold text-background-dark dark:text-white mb-1">Ranked</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Order by preference</span>
</label>
<!-- Approval -->
<label class="relative flex flex-col p-4 border border-slate-200 dark:border-primary/20 rounded-lg cursor-pointer hover:border-primary/50">
<input class="absolute top-4 right-4 text-primary focus:ring-primary h-4 w-4" name="vote_type" type="radio"/>
<span class="font-bold text-background-dark dark:text-white mb-1">Approval</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Select multiple options</span>
</label>
</div>
</div>
<!-- Deadline Picker -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-200">Deadline</label>
<div class="flex items-center gap-3">
<div class="relative flex-1">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">calendar_today</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-primary text-sm text-background-dark dark:text-white" type="text" value="Nov 14, 2024"/>
</div>
<div class="relative flex-1">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">schedule</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-primary text-sm text-background-dark dark:text-white" type="text" value="02:30 PM"/>
</div>
</div>
<p class="text-[10px] text-primary/60 font-medium">Automatically ends in 48 hours</p>
</div>
<!-- Toggles -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100 dark:border-primary/10">
<!-- Anonymous -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-full">
<span class="material-icons text-primary text-sm">lock</span>
</div>
<div>
<div class="text-sm font-semibold text-background-dark dark:text-white">Anonymous voting</div>
<div class="text-[11px] text-slate-500">Hide identities of voters</div>
</div>
</div>
<button class="w-10 h-5 bg-primary rounded-full relative transition-colors">
<div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
</button>
</div>
<!-- Allow Changes -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-full">
<span class="material-icons text-primary text-sm">edit</span>
</div>
<div>
<div class="text-sm font-semibold text-background-dark dark:text-white">Allow vote changes</div>
<div class="text-[11px] text-slate-500">Enable switching choices</div>
</div>
</div>
<button class="w-10 h-5 bg-primary rounded-full relative transition-colors">
<div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 border-t border-primary/10 flex items-center justify-end gap-3 sticky bottom-0 bg-white dark:bg-[#22172e] z-10">
<button class="px-6 py-2.5 border border-slate-300 dark:border-primary/30 text-slate-600 dark:text-slate-300 font-semibold rounded-lg hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
                    Cancel
                </button>
<button class="px-8 py-2.5 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]">
                    Create Poll
                </button>
</div>
</div>
</div>
</body></html>
