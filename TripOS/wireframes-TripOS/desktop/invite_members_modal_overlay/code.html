<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Invite Members Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="relative w-full max-w-lg bg-white dark:bg-slate-800 rounded-xl shadow-2xl z-50 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4">
<div class="flex items-center justify-between mb-2">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Invite to Summer in Santorini</h2>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-icons">close</span>
</button>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm">Add your travel companions to start planning together.</p>
</div>
<!-- Tabs Navigation -->
<div class="px-8 flex border-b border-slate-100 dark:border-slate-700">
<button class="relative py-3 px-4 text-sm font-medium text-primary border-b-2 border-primary">
                Email
            </button>
<button class="relative py-3 px-4 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                Share Link
            </button>
</div>
<!-- Modal Content (Email Tab Active) -->
<div class="p-8 space-y-6">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Recipient emails</label>
<div class="flex flex-wrap items-center gap-2 p-2 min-h-[48px] border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900/50 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
<!-- Email Tag -->
<div class="flex items-center gap-1.5 px-3 py-1 bg-primary text-white rounded-full text-sm font-medium">
<span>friend@trip.com</span>
<button class="hover:text-white/80 transition-colors">
<span class="material-icons text-base">close</span>
</button>
</div>
<!-- Text Input for new tags -->
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 min-w-[120px]" placeholder="Add email..." type="text"/>
</div>
</div>
<!-- Role Selector -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Role</label>
<div class="relative">
<select class="w-full pl-4 pr-10 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg text-sm text-slate-900 dark:text-white appearance-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all cursor-pointer">
<option selected="">Member</option>
<option>Admin</option>
<option>Viewer</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
<span class="material-icons">expand_more</span>
</div>
</div>
<!-- Role Description Box -->
<div class="mt-3 p-3 bg-primary/5 dark:bg-primary/10 border border-primary/20 rounded-lg flex gap-3">
<span class="material-icons text-primary text-lg">info</span>
<p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
<span class="font-semibold text-primary">Member:</span> Can vote on itineraries, suggest new activities, and view all trip content.
                    </p>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-8 py-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex flex-col sm:flex-row-reverse gap-3">
<button class="w-full sm:w-auto px-8 py-3 bg-primary hover:bg-primary/90 text-white font-semibold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-icons text-lg">send</span>
                Send Invites
            </button>
<button class="w-full sm:w-auto px-8 py-3 bg-white dark:bg-slate-700 hover:bg-slate-100 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-semibold rounded-lg border border-slate-200 dark:border-slate-600 transition-all">
                Cancel
            </button>
</div>
<!-- Visual Context Helper (Background Placeholder for the page behind modal) -->
<div class="absolute -z-50 inset-0 pointer-events-none">
<img alt="Beautiful Santorini landscape with blue domes" class="opacity-0" data-alt="Beautiful Santorini landscape with blue domes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaPDymHI9U6miT4xfT41U9Kr7D1kzJFeOoEYIHYLJI2EccrV-5Oq79qUUwsySrBfQ-hXBoR3TXs9y8Hp4RNPYi8ail0usjU-3geZGsae7vltu7NI-CYUSwHVQpwT1JMQ7pXt0iq2fW8SsJZzfE8b4QCCrVpWMFCEX9Th6hnWcxQYoSA2od3bH2AQPLBAymDYRX_aAKOvldPJ0arHv1OQf2OBFWrM8wzg7m_C7JtFFhSAMeRkqZUgLM4UiDIB56jJDnOlg8pzcuWRo"/>
</div>
</div>
<!-- Hidden Share Link Tab Content Structure (For visualization/reference) -->
<div class="hidden">
<div class="space-y-4">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Shareable Invite Link</label>
<div class="flex gap-2">
<input class="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg px-4 py-3 text-sm text-slate-500" readonly="" type="text" value="https://tripos.app/join/summer-santorini-2024-xyz"/>
<button class="p-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">
<span class="material-icons">content_copy</span>
</button>
</div>
<p class="text-xs text-slate-500 italic">Anyone with this link can join as a Member.</p>
</div>
</div>
</body></html>
