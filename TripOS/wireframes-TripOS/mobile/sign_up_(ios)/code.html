<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>TripOS - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Mobile safe areas for iOS */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display selection:bg-primary/30">
<!-- iOS Status Bar Mock (Visual Only) -->
<div class="fixed top-0 w-full z-50 px-8 py-3 flex justify-between items-center safe-top bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-[16px]">signal_cellular_alt</span>
<span class="material-icons text-[16px]">wifi</span>
<span class="material-icons text-[18px] rotate-90">battery_full</span>
</div>
</div>
<!-- Main Container -->
<main class="min-h-screen flex flex-col px-6 pt-24 pb-12 max-w-md mx-auto">
<!-- Header Section -->
<header class="text-center mb-10">
<div class="flex items-center justify-center mb-4">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-icons text-white text-3xl">flight_takeoff</span>
</div>
</div>
<h1 class="text-[28px] font-extrabold text-primary tracking-tight">TripOS</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Plan group trips without the awkwardness</p>
</header>
<!-- Social Authentication -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl font-semibold shadow-sm active:scale-[0.98] transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.92 3.32-2.12 4.44-1.12 1.12-2.8 2.32-5.72 2.32-4.52 0-8.24-3.64-8.24-8.16s3.72-8.16 8.24-8.16c2.48 0 4.28.96 5.64 2.24l2.32-2.32C18.52 2.52 15.92 1 12.48 1 6.48 1 1.64 5.84 1.64 11.84s4.84 10.84 10.84 10.84c3.24 0 5.68-1.04 7.6-3.04 1.96-1.96 2.56-4.72 2.56-7.04 0-.44-.04-.88-.12-1.32l-10.04.04z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl font-semibold shadow-sm active:scale-[0.98] transition-all">
<svg class="w-5 h-5 dark:fill-white" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.22 1.72-3.72 1.72-1.36 0-2.2-.42-3.1-.42-.94 0-2 .44-3.17.44-2.86 0-5.32-2.43-5.32-6.17 0-3.32 2.22-5.1 4.2-5.1 1.04 0 1.94.43 2.8.43.84 0 1.5-.43 2.76-.43 1.34 0 2.55.57 3.38 1.65-2.67 1.4-2.24 5.17.47 6.28-.58 1.5-1.36 2.65-2.3 3.6zm-3.56-14.86c.64-.8 1.08-1.9 1.08-3.04 0-.16-.02-.32-.05-.47-1.03.04-2.27.7-3.02 1.6-.66.78-1.14 1.93-1.14 3.03 0 .18.03.35.06.47 1.15.08 2.28-.68 3.07-1.59z"></path>
</svg>
<span>Continue with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative mb-8 flex items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm font-medium">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<div>
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 px-1" for="email">Email Address</label>
<input class="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="email" placeholder="hello@tripos.app" type="email"/>
</div>
<div>
<label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 px-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary" type="button">
<span class="material-icons text-[20px]">visibility</span>
</button>
</div>
<p class="mt-2 text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1.5 px-1">
<span class="material-icons text-[14px]">info</span>
                    Minimum 8 characters
                </p>
</div>
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all mt-4" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Navigation -->
<div class="mt-8 text-center">
<p class="text-slate-600 dark:text-slate-400 font-medium">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign in</a>
</p>
</div>
<!-- Sticky Bottom Footer (Safe Area) -->
<footer class="mt-auto pt-10 pb-4 safe-bottom">
<div class="px-6 text-center">
<p class="text-[11px] text-slate-400 dark:text-slate-500 leading-relaxed">
                    By signing up, you agree to our 
                    <a class="underline font-semibold" href="#">Terms of Service</a> 
                    and 
                    <a class="underline font-semibold" href="#">Privacy Policy</a>.
                </p>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-5"></div>
</footer>
</main>
<!-- Decoration element -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
