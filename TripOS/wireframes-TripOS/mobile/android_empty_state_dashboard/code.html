<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex justify-center items-center min-h-screen p-4">
<!-- Phone Container Simulation -->
<div class="relative w-full max-w-[390px] h-[844px] bg-white dark:bg-gray-900 overflow-hidden shadow-2xl rounded-[3rem] border-[8px] border-gray-100 dark:border-gray-800 flex flex-col">
<!-- Status Bar Space (iOS/Android feel) -->
<div class="h-10 w-full flex items-center justify-between px-8 pt-4">
<span class="text-xs font-bold dark:text-white">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-[14px] dark:text-white">signal_cellular_alt</span>
<span class="material-icons text-[14px] dark:text-white">wifi</span>
<span class="material-icons text-[14px] dark:text-white">battery_full</span>
</div>
</div>
<!-- Material 3 Top App Bar -->
<header class="h-16 flex items-center justify-between px-6 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center gap-4">
<button class="text-gray-600 dark:text-gray-300">
<span class="material-icons">menu</span>
</button>
<h1 class="text-xl font-bold text-gray-900 dark:text-white">Trips</h1>
</div>
<div class="flex items-center gap-4">
<button class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-icons text-primary text-xl">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Area (Empty State) -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- Illustration Placeholder -->
<div class="w-full aspect-square max-w-[240px] mb-8 relative flex items-center justify-center bg-primary/5 rounded-full">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<span class="material-icons text-[120px] text-primary">explore</span>
</div>
<img alt="Travel Illustration" class="w-48 h-48 object-cover rounded-full shadow-lg border-4 border-white dark:border-gray-800" data-alt="Abstract colorful travel map and pins illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpua4Jl9D0KSmzy6zQTyhnPNoGboJJjb_OEQFfSSMIP3uTgkfnGcSCz20uSy8y-25DVQU3UVIo3rZALm9i8qudf1eXayqteuAi5kgOyLCgMwuvr1bklhC6bJQ7mhm0dmavW0-g8Hb_yM590DbKvDVGLpiGTtWqGixDo8IHEw7Yy0sM9UeIVgvILiDWfwjFz0hcgkLpMawelY7uyQZzhDxE_Earx7HylZMdY0hFHrKTO0E62wO3_-SFipsLvMM3Brcp9Ib4vcghC2M"/>
</div>
<!-- Empty State Text -->
<h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">No trips yet</h2>
<p class="text-gray-500 dark:text-gray-400 text-base leading-relaxed mb-8">
                Plan your next adventure with friends. Start by creating a collaborative itinerary.
            </p>
<!-- Full Width Button (Material Style) -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-icons text-[20px]">add</span>
                Create Your First Trip
            </button>
</main>
<!-- Floating Action Button -->
<div class="absolute bottom-24 right-6">
<button class="w-14 h-14 bg-primary text-white rounded-xl shadow-xl flex items-center justify-center transition-transform active:scale-95">
<span class="material-icons text-[28px]">edit_road</span>
</button>
</div>
<!-- Bottom Navigation -->
<nav class="h-20 bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 flex items-center justify-around px-4 pb-4">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="bg-primary/10 px-4 py-1 rounded-full">
<span class="material-icons">flight_takeoff</span>
</div>
<span class="text-[11px] font-bold">Trips</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-primary transition-colors" href="#">
<span class="material-icons">search</span>
<span class="text-[11px] font-medium">Explore</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-primary transition-colors" href="#">
<span class="material-icons">notifications_none</span>
<span class="text-[11px] font-medium">Alerts</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-primary transition-colors" href="#">
<span class="material-icons">person_outline</span>
<span class="text-[11px] font-medium">Profile</span>
</a>
</nav>
<!-- Home Indicator (iOS Style) -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
</body></html>
