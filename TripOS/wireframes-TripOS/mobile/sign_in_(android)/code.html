<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ios-status-bar {
            height: 44px;
        }
        .ios-home-indicator {
            height: 34px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
<!-- Phone Container Simulation -->
<div class="relative w-full max-w-[400px] min-h-[812px] bg-white dark:bg-slate-950 shadow-2xl overflow-hidden flex flex-col">
<!-- Status Bar Space -->
<div class="ios-status-bar flex justify-between items-center px-8 pt-4">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-xs">signal_cellular_alt</span>
<span class="material-icons text-xs">wifi</span>
<span class="material-icons text-xs rotate-90">battery_full</span>
</div>
</div>
<!-- Main Content Scroll Area -->
<div class="flex-1 px-8 pt-12 pb-10 flex flex-col">
<!-- Logo and Header -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-20 h-20 bg-primary/10 rounded-xl flex items-center justify-center mb-6">
<span class="material-icons text-primary text-5xl">explore</span>
</div>
<h1 class="text-3xl font-bold tracking-tight mb-2">TripOS</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Collaborative travel made simple.</p>
</div>
<!-- Social Buttons -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-4 border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors font-medium">
<img alt="Google" class="w-5 h-5" data-alt="Google colorful brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAbJI43zu6GCs0okc9kn1m7agFoXsDB9HaCerLEDMHMkXvGayBolxDUwI1O2btzZFir49tt_HxA9JVcPNnomwFzVbILwfzFUzx2k8_3qVdhqgmgwp9idAg4M-dKNZFTR5evXvFpsihK4T7ngWwbDaE03uCs_cjHCcsaG-EvvyVIU4qfO9J_HbriKJeOS9OIgUlMo0wyI4m3yILvoF0Sh5nRZHiotf5nT73E2Q1COZ8Miz0uAUIN28NMx2SZxWsUdq4N9wZsKEMaNc"/>
<span>Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-4 border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors font-medium">
<span class="material-icons text-xl">apple</span>
<span>Continue with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center mb-8">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs font-semibold text-slate-400 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<!-- Email & Password Form -->
<form class="space-y-5">
<div>
<label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800 rounded-lg py-3.5 px-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="e.g. wanderlust@example.com" type="email"/>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Password</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800 rounded-lg py-3.5 px-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-icons text-lg">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Bottom Navigation -->
<div class="mt-auto pt-10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    New to TripOS? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="ios-home-indicator flex justify-center items-end pb-2">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
<!-- Aesthetic Decorative Background Elements (Outside phone) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
