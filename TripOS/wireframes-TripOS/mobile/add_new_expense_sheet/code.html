<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>TripOS - Add New Expense</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-end justify-center">
<!-- Backdrop (Simulating the screen behind the sheet) -->
<div class="fixed inset-0 bg-black/40 z-0">
<div class="p-6">
<div class="flex items-center justify-between mb-8 opacity-20">
<span class="material-icons text-3xl">arrow_back_ios</span>
<h1 class="text-xl font-bold">Trip to Tokyo</h1>
<span class="material-icons text-3xl">settings</span>
</div>
<!-- Mock Background Content -->
<div class="space-y-4 opacity-10">
<div class="h-32 bg-white rounded-lg shadow-sm"></div>
<div class="h-20 bg-white rounded-lg shadow-sm"></div>
<div class="h-20 bg-white rounded-lg shadow-sm"></div>
<div class="h-20 bg-white rounded-lg shadow-sm"></div>
</div>
</div>
</div>
<!-- Bottom Sheet Container (iOS UISheetPresentationController Style) -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-t-xl shadow-2xl z-10 relative animate-slide-up overflow-hidden">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2">
<div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
<div class="px-6 pb-10">
<!-- Amount Input Section -->
<div class="mt-4 flex flex-col items-center">
<p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Amount</p>
<div class="flex items-center justify-center">
<span class="text-3xl font-bold text-primary mr-1">$</span>
<input autofocus="" class="w-full text-center text-[36px] font-bold bg-transparent border-none focus:ring-0 p-0 text-slate-900 dark:text-white" type="text" value="0.00"/>
</div>
<div class="mt-1 flex items-center bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-750 transition-colors">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400">USD</span>
<span class="material-icons text-sm ml-1 text-slate-400">expand_more</span>
</div>
</div>
<!-- Expense Form -->
<div class="mt-8 space-y-6">
<!-- Description -->
<div>
<input class="w-full text-lg font-medium border-0 border-b border-slate-100 dark:border-slate-800 focus:border-primary focus:ring-0 px-0 pb-3 bg-transparent placeholder:text-slate-300 dark:placeholder:text-slate-600" placeholder="What was it for?" type="text"/>
</div>
<!-- Category Pills -->
<div class="space-y-3">
<label class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Category</label>
<div class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide no-scrollbar">
<button class="flex-shrink-0 flex items-center space-x-2 px-4 py-2 rounded-full bg-primary text-white shadow-md shadow-primary/20">
<span class="material-icons text-lg">restaurant</span>
<span class="text-sm font-medium">Food</span>
</button>
<button class="flex-shrink-0 flex items-center space-x-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-750 transition-colors">
<span class="material-icons text-lg">commute</span>
<span class="text-sm font-medium">Transport</span>
</button>
<button class="flex-shrink-0 flex items-center space-x-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-750 transition-colors">
<span class="material-icons text-lg">local_activity</span>
<span class="text-sm font-medium">Activity</span>
</button>
<button class="flex-shrink-0 flex items-center space-x-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-750 transition-colors">
<span class="material-icons text-lg">hotel</span>
<span class="text-sm font-medium">Lodging</span>
</button>
</div>
</div>
<!-- Detail Rows -->
<div class="bg-slate-50 dark:bg-slate-800/50 rounded-lg overflow-hidden border border-slate-100 dark:border-slate-800">
<!-- Paid By -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center space-x-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close up portrait of a smiling man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqhPF3kft1bzl7hmvuylmkRal23lqgqEXw4N2Dzca-S7dbJFZDOZeU1Ayf4OmgRVJRZTXGfKQmtxJeL8P-TQ-9l3cUcNf8t0WEYy92KJusdtQ-m05K3hsATnAgo5EMRXN_Pve7wq04Dw78saxCXcsOZn5ZreuO5iXFIEj95wBux794pndcOUxzVl7ODW-OiaIArMgwVl3mqspT2t0Nz-5OOnUiQTcjuG0URtypuocXf9wAW8AcwEiOYiVCeqT1SXBBpBJTOTEZBb0"/>
</div>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Paid by</span>
</div>
<div class="flex items-center space-x-2">
<span class="text-sm font-semibold text-slate-900 dark:text-white">Me</span>
<span class="material-icons text-slate-400">chevron_right</span>
</div>
</button>
<div class="h-[1px] bg-slate-100 dark:bg-slate-800 mx-4"></div>
<!-- Split Method -->
<button class="w-full flex items-center justify-between p-4 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<div class="flex items-center space-x-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons text-sm">groups</span>
</div>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Split method</span>
</div>
<div class="flex items-center space-x-2">
<span class="text-sm font-semibold text-slate-900 dark:text-white">Split equally</span>
<span class="material-icons text-slate-400">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Footer Action Button -->
<div class="mt-10">
<button class="w-full py-4 bg-primary text-white font-bold rounded-full shadow-lg shadow-primary/30 hover:bg-blue-600 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
<span class="material-icons">check_circle</span>
<span>Save Expense</span>
</button>
</div>
</div>
<!-- IOS Bottom Home Indicator Padding -->
<div class="h-6 w-full"></div>
</div>
<style>
        /* Custom scrollbar hiding for horizontal category picker */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Subtle slide up animation for mobile sheet feel */
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</body></html>
