<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS Map View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .map-gradient {
            background: radial-gradient(circle at center, #1b2132 0%, #111521 100%);
        }
        /* Custom scrollbar for activity list */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white overflow-hidden">
<!-- Main Container (Phone Viewport) -->
<div class="relative flex h-screen w-full flex-col bg-background-dark overflow-hidden">
<!-- Full Screen Map Layer -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center relative" data-alt="Dark themed interactive city map with streets" data-location="London" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDAvdvMabD5oLX0AGNivMiB4PD-Jc1LSdWVjsrZ-RrOjVIkdPY-nDU1ebsgXcsBr4Z5RzFisw6fIa2GFQ16yq4X8fM5E4XGRBWu6Q6LR1_swHOmxo6cVCC201dUe1IhmYtP6sLzBl6pzP2gq5UWHQ4ZrnSXGO6Pw6THDWNGXe90E5C9fnSrmgG7FxB_RS4UQhSYpFEp0qbwQgEZLx6dGt7JODY0E659Oa9lDRJOaRyC0A7bdTfpp5U9QoZhGLhhSXUWFg3T4qHfLLc');">
<!-- SVG Overlay for Connecting Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<path d="M 100 250 L 220 380 L 320 320" fill="transparent" stroke="#1d4fd7" stroke-dasharray="8,6" stroke-width="3"></path>
</svg>
<!-- Map Pins (Primary Blue Circles) -->
<!-- Pin 1 -->
<div class="absolute top-[235px] left-[85px] flex items-center justify-center size-7 rounded-full bg-primary border-2 border-white shadow-lg shadow-primary/40">
<span class="text-[12px] font-bold">1</span>
</div>
<!-- Pin 2 (Selected) -->
<div class="absolute top-[365px] left-[205px] flex items-center justify-center size-9 rounded-full bg-primary border-4 border-white shadow-xl shadow-primary/60 scale-110">
<span class="text-sm font-bold">2</span>
</div>
<!-- Pin 3 -->
<div class="absolute top-[305px] left-[305px] flex items-center justify-center size-7 rounded-full bg-primary border-2 border-white shadow-lg shadow-primary/40">
<span class="text-[12px] font-bold">3</span>
</div>
</div>
</div>
<!-- Floating Top Bar (Material Design Inspired) -->
<div class="relative z-20 px-4 pt-12 pb-4">
<div class="flex items-center justify-between bg-background-dark/80 backdrop-blur-md rounded-xl p-3 shadow-2xl border border-white/10">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
<div>
<h1 class="text-sm font-bold text-white/90 leading-none">Day 2 — Map</h1>
<p class="text-[11px] text-primary font-medium tracking-wide uppercase mt-1">London Itinerary</p>
</div>
</div>
<button class="flex items-center gap-1 px-3 py-1.5 bg-primary/20 rounded-lg border border-primary/30 hover:bg-primary/30 transition-colors">
<span class="text-xs font-bold text-primary">Day 2</span>
<span class="material-symbols-outlined text-primary text-sm">expand_more</span>
</button>
</div>
</div>
<!-- Map Navigation Controls (Floating Bottom Right) -->
<div class="absolute bottom-[52%] right-4 z-10 flex flex-col gap-2">
<button class="size-11 flex items-center justify-center bg-background-dark/90 backdrop-blur-sm rounded-lg border border-white/10 shadow-lg text-white">
<span class="material-symbols-outlined">my_location</span>
</button>
<div class="flex flex-col bg-background-dark/90 backdrop-blur-sm rounded-lg border border-white/10 shadow-lg overflow-hidden">
<button class="size-11 flex items-center justify-center border-b border-white/10 text-white hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-11 flex items-center justify-center text-white hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- Draggable Bottom Sheet (Half State) -->
<div class="absolute inset-x-0 bottom-0 z-30 flex flex-col h-1/2 bg-background-dark border-t border-white/10 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<!-- Drag Handle -->
<div class="flex justify-center py-3">
<div class="w-10 h-1 rounded-full bg-white/20"></div>
</div>
<!-- List Header -->
<div class="px-5 pb-4 flex justify-between items-center">
<h2 class="text-lg font-bold text-white tracking-tight">Daily Itinerary</h2>
<span class="text-xs text-white/40 font-medium">3 Activities</span>
</div>
<!-- Activities List -->
<div class="flex-1 overflow-y-auto no-scrollbar px-2">
<!-- Activity Row 1 -->
<div class="flex items-center gap-4 px-3 py-4 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex-shrink-0 size-10 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-white/60 font-bold group-hover:border-primary/50 transition-colors">
                        1
                    </div>
<div class="flex-1 min-w-0">
<h3 class="text-sm font-semibold text-white truncate">Breakfast at The Diner</h3>
<p class="text-[11px] text-white/40 mt-0.5 uppercase tracking-wider">09:00 AM • Soho</p>
</div>
<div class="text-white/20">
<span class="material-symbols-outlined text-sm">check_circle</span>
</div>
</div>
<!-- Activity Row 2 (Selected/Active) -->
<div class="flex items-center gap-4 px-3 py-4 rounded-xl bg-primary/10 border-l-4 border-primary shadow-sm relative overflow-hidden group">
<!-- Subtle Glow Effect for active row -->
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex-shrink-0 size-10 rounded-lg bg-primary flex items-center justify-center text-white font-bold shadow-lg shadow-primary/20">
                        2
                    </div>
<div class="flex-1 min-w-0">
<h3 class="text-sm font-semibold text-white truncate">Art Museum</h3>
<p class="text-[11px] text-primary font-bold mt-0.5 uppercase tracking-wider">11:00 AM • South Bank</p>
</div>
<div class="text-primary">
<span class="material-symbols-outlined text-sm">pending</span>
</div>
</div>
<!-- Activity Row 3 -->
<div class="flex items-center gap-4 px-3 py-4 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex-shrink-0 size-10 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-white/60 font-bold group-hover:border-primary/50 transition-colors">
                        3
                    </div>
<div class="flex-1 min-w-0">
<h3 class="text-sm font-semibold text-white truncate">Central Park Walk</h3>
<p class="text-[11px] text-white/40 mt-0.5 uppercase tracking-wider">02:00 PM • Westminster</p>
</div>
<div class="text-white/20">
<span class="material-symbols-outlined text-sm">radio_button_unchecked</span>
</div>
</div>
<!-- Extra space for bottom safe areas -->
<div class="h-8"></div>
</div>
</div>
<!-- Floating Add Button (Android Style FAB position but integrated into sheet) -->
<button class="absolute bottom-6 right-6 z-40 size-14 rounded-full bg-primary flex items-center justify-center text-white shadow-2xl shadow-primary/50 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</body></html>
