<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>TripOS Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .dynamic-island-spacer {
            height: 44px; /* Default height for modern iOS status bar area */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">

</div>

<span class="material-icons-round text-[28px]">add_circle_outline</span>
</button>
<div class="relative">
<button class="text-slate-400 dark:text-slate-500 hover:opacity-70 transition-opacity flex items-center">
<span class="material-icons-round text-[26px]">notifications</span>
</button>
<!-- Notification Badge -->
<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white dark:border-background-dark">3</span>
</div>
</div>
</div>

<div class="w-8 h-8 rounded-full border-2 border-white dark:border-slate-800 bg-primary flex items-center justify-center text-[10px] text-white font-bold">

</div>
</div>
</div>
</div>
</div>

<!-- Bottom Tab Bar Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-background-dark/90 ios-blur border-t border-slate-200 dark:border-slate-800 z-50">
<div class="flex justify-around items-center pt-3 pb-2 px-6">
<!-- Active Tab: My Trips -->
<button class="flex flex-col items-center group relative pb-3">
<span class="material-icons-round text-primary text-[28px]">flight_takeoff</span>
<span class="text-[11px] font-semibold text-primary mt-1">My Trips</span>
<!-- Active Indicator (2pt underline) -->
<div class="absolute bottom-0 w-8 h-[2px] bg-primary rounded-full"></div>
</button>
<!-- Inactive Tab: Profile -->
<button class="flex flex-col items-center group pb-3">
<span class="material-icons-round text-slate-400 dark:text-slate-500 text-[28px] group-active:text-primary transition-colors">person_outline</span>
<span class="text-[11px] font-semibold text-slate-400 dark:text-slate-500 mt-1 group-active:text-primary transition-colors">Profile</span>
</button>
</div>
<!-- iOS Home Indicator Safe Area -->
<div class="safe-bottom h-5"></div>
</nav>
<!-- Floating Action Hint (Optional iOS flair) -->
<div class="fixed bottom-24 right-6 pointer-events-none">
<div class="flex items-center justify-center w-14 h-14 rounded-full bg-primary shadow-xl shadow-primary/30 text-white pointer-events-auto active:scale-95 transition-transform">
<span class="material-icons-round text-3xl">add</span>
</div>
</div>
