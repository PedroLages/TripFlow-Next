<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Create Poll</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Material+Icons+Outlined&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b1dd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161121",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-icons-outlined {
            font-size: 20px;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-200 flex items-center justify-center min-h-screen p-4">
<!-- Mobile Device Mockup Container -->
<div class="w-[375px] h-[812px] bg-background-light dark:bg-background-dark rounded-[3rem] shadow-2xl overflow-hidden relative border-[8px] border-slate-900">
<!-- Background/Map Layer (Static) -->
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover grayscale" data-alt="Abstract map showing city grid layout" data-location="Tokyo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDozl_RdYj5_t3yOJ0vKtfnkY2v7i1Pqd7aXZwgvr9d0kZALemD63beXCYKUkqKxg16n3W03NRvE2QFaWIXHKI-kGu0w--181ZL6QH37UCxcSb2yhnZUWrwvAEvDVWg0NPkesBBzOeM3xCLoge04WFuBK5BzxID7zmp63WP-1YDSVhyYolK3H71cMqR04Xu08zFdwh2kQ-Oy9875hESCDZ1m8pp7V8VxuEpuaGbobMP0TMf19Q3CIMD-h67XmpYKCOqWMqUOYz67p4"/>
</div>
<!-- Android-Style Bottom Sheet -->
<div class="absolute inset-0 top-12 bg-white dark:bg-zinc-900 rounded-t-xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] flex flex-col overflow-hidden">
<!-- Drag Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-10 h-1 bg-slate-300 dark:bg-zinc-700 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-6 pb-6 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 flex items-center justify-center rounded-xl">
<span class="material-icons-outlined text-primary">how_to_vote</span>
</div>
<h1 class="text-xl font-bold text-slate-900 dark:text-white">Create Poll</h1>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-zinc-800 rounded-full transition-colors">
<span class="material-icons-outlined text-slate-500">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar px-6 space-y-8 pb-32">
<!-- Question Input -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Question</label>
<textarea class="w-full bg-slate-100 dark:bg-zinc-800 border-none rounded-lg p-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 resize-none" placeholder="What should we decide?" rows="2"></textarea>
</div>
<!-- Poll Options -->
<div class="space-y-4">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Options</label>
<div class="space-y-3">
<div class="flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full bg-slate-50 dark:bg-zinc-800/50 border-b-2 border-slate-200 dark:border-zinc-700 focus:border-primary px-0 py-3 text-slate-900 dark:text-white transition-all outline-none" placeholder="Choice 1" type="text"/>
</div>
<button class="text-slate-400"><span class="material-icons-outlined">drag_indicator</span></button>
</div>
<div class="flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full bg-slate-50 dark:bg-zinc-800/50 border-b-2 border-slate-200 dark:border-zinc-700 focus:border-primary px-0 py-3 text-slate-900 dark:text-white transition-all outline-none" placeholder="Choice 2" type="text"/>
</div>
<button class="text-slate-400"><span class="material-icons-outlined">drag_indicator</span></button>
</div>
</div>
<button class="flex items-center gap-2 text-primary font-semibold py-2 hover:bg-primary/5 rounded-lg transition-colors">
<span class="material-icons-outlined text-sm">add</span>
                        Add Option
                    </button>
</div>
<!-- Vote Type -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Vote Type</label>
<div class="flex flex-wrap gap-2">
<!-- Pill Selected -->
<div class="px-4 py-2 bg-primary text-white rounded-full flex items-center gap-2 cursor-pointer shadow-sm">
<span class="material-icons-outlined text-sm">check_circle</span>
<span class="text-sm font-medium">Yes/No</span>
</div>
<!-- Pill Unselected -->
<div class="px-4 py-2 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-slate-300 rounded-full flex items-center gap-2 cursor-pointer hover:bg-slate-200 transition-colors">
<span class="text-sm font-medium">Ranked</span>
</div>
<div class="px-4 py-2 bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-slate-300 rounded-full flex items-center gap-2 cursor-pointer hover:bg-slate-200 transition-colors">
<span class="text-sm font-medium">Approval</span>
</div>
</div>
</div>
<!-- Advanced Settings Accordion (Collapsed) -->
<div class="border-t border-slate-100 dark:border-zinc-800 pt-6">
<div class="flex items-center justify-between cursor-pointer group">
<div class="flex items-center gap-3">
<span class="material-icons-outlined text-slate-400 group-hover:text-primary transition-colors">settings</span>
<span class="font-semibold text-slate-700 dark:text-slate-200">Advanced Settings</span>
</div>
<span class="material-icons-outlined text-slate-400 group-hover:text-primary transition-colors">expand_more</span>
</div>
<!-- Hidden contents visually hinted by spacing -->
<div class="mt-4 space-y-4 opacity-50">
<div class="flex items-center justify-between">
<span class="text-sm text-slate-600 dark:text-slate-400">Anonymous Voting</span>
<!-- Material Switch -->
<div class="w-10 h-6 bg-slate-200 dark:bg-zinc-700 rounded-full relative">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<div class="flex items-center justify-between">
<span class="text-sm text-slate-600 dark:text-slate-400">Allow Multiple Choices</span>
<!-- Material Switch -->
<div class="w-10 h-6 bg-primary/40 rounded-full relative">
<div class="absolute right-1 top-1 w-4 h-4 bg-primary rounded-full shadow-sm"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Sticky Footer -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-t border-slate-100 dark:border-zinc-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                    Create Poll
                </button>
<div class="mt-4 flex justify-center">
<div class="w-32 h-1.5 bg-slate-900/10 dark:bg-white/10 rounded-full"></div>
</div>
</div>
</div>
<!-- Android Status Bar Mockup -->
<div class="absolute top-0 left-0 right-0 h-10 flex items-center justify-between px-8 text-slate-900 dark:text-white z-50">
<div class="text-sm font-medium">9:41</div>
<div class="flex items-center gap-2">
<span class="material-icons-outlined text-sm">signal_cellular_alt</span>
<span class="material-icons-outlined text-sm">wifi</span>
<span class="material-icons-outlined text-sm">battery_full</span>
</div>
</div>
</div>
</body></html>
