<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Profile Background (Dimmed/Blurred) -->
<div class="absolute inset-0 z-0 flex flex-col">
<!-- iOS Status Bar Placeholder -->
<div class="h-12 flex items-center justify-between px-6">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center space-x-2">
<span class="material-icons text-sm">signal_cellular_4_bar</span>
<span class="material-icons text-sm">wifi</span>
<span class="material-icons text-sm">battery_full</span>
</div>
</div>
<!-- Fake Profile Content -->
<div class="px-6 pt-4 opacity-40">
<div class="flex items-center space-x-4 mb-8">
<div class="w-20 h-20 rounded-full overflow-hidden bg-slate-200">
<img class="w-full h-full object-cover" data-alt="User profile avatar portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAHtHgS2WuZneU-7TqGbaeU0ZqJ9PXdIqMLSc0Jzr26RjeIVWTcW5gGLAj5mu3MTKpbV6sMi8FPHfsTBF8zIG3DeF0XJbcaxHPjT_6wHI8Fb24Pte0jp6rR9AuxXKVZeXsnRyd2C7sFIMu3HJ1GPhc0QLsZHN8HPuD2ZRu-1VX-N6ocySjCC0lYG8gLlV00cy8sKGl1YegbC9nV8VL-KmqPw2sDXWmVCxtIemkWieIF-ygydeCe9bJUSZlK31J_CuZktV1xb46Qro"/>
</div>
<div>
<h1 class="text-2xl font-bold">Alex Johnson</h1>
<p class="text-slate-500">alex.johnson@example.com</p>
</div>
</div>
<div class="space-y-4">
<div class="p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-sm font-medium text-slate-500">Personal Information</p>
</div>
<div class="p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 flex justify-between">
<p class="text-sm font-medium text-slate-500">Settings</p>
</div>
</div>
</div>
<!-- Dark Backdrop Scrim -->
<div class="absolute inset-0 bg-black/40 z-10"></div>
</div>
<!-- Bottom Sheet Component -->
<div class="absolute bottom-0 left-0 right-0 z-20 max-w-md mx-auto">
<div class="bg-white dark:bg-[#1c2a38] rounded-t-xl shadow-2xl ios-blur bg-opacity-95 dark:bg-opacity-95 border-t border-slate-200/50 dark:border-slate-700/50">
<!-- Drag Handle -->
<div class="flex justify-center pt-3 pb-2">
<div class="w-10 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<h2 class="text-xl font-bold">Change Password</h2>
<button class="w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full text-slate-500">
<span class="material-icons text-lg">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-6 space-y-6">
<!-- Current Password -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">Current Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Enter current password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-icons text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">New Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Create new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-icons text-xl">visibility</span>
</button>
</div>
<p class="text-xs text-slate-500 mt-1 ml-1 flex items-center">
<span class="material-icons text-xs mr-1">info</span>
                        At least 8 characters, 1 uppercase, 1 number
                    </p>
</div>
<!-- Confirm Password -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-600 dark:text-slate-400 ml-1">Confirm New Password</label>
<div class="relative">
<input class="w-full px-4 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Repeat new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-icons text-xl">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4 pb-10">
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
                        Update Password
                    </button>
<button class="w-full mt-4 py-2 text-primary font-semibold">
                        Cancel
                    </button>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</div>
</body></html>
