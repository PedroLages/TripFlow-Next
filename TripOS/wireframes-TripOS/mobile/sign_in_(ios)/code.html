<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                        "neutral-ios": "#8e8e93",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .safe-area-top {
            padding-top: env(safe-area-inset-top);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Status Bar Spacer (iOS Style) -->
<div class="h-12 safe-area-top"></div>
<main class="flex-grow flex flex-col px-8 pb-10">
<!-- Logo & Tagline -->
<div class="flex flex-col items-center mt-8 mb-12">
<div class="w-20 h-20 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 mb-6">
<span class="material-icons text-white text-5xl">explore</span>
</div>
<h1 class="text-3xl font-bold tracking-tight mb-2">TripOS</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium">Your group's journey starts here</p>
</div>
<!-- Social Buttons Section -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 bg-black text-white py-4 rounded-lg font-semibold active:opacity-80 transition-opacity">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.06 1.72-3.3 1.72-1.21 0-1.61-.75-3.08-.75-1.48 0-1.92.73-3.08.73-1.14 0-2.23-.68-3.19-1.63C2.41 18.35 1 15.65 1 12.75c0-2.81 1.41-4.94 3.44-4.94 1.05 0 1.83.65 2.65.65.81 0 1.75-.7 3-.7 1.09 0 2.45.54 3.32 1.63-2.61 1.25-2.19 4.88.54 6.07-.63 1.57-1.44 3.31-2.9 4.82zM12.02 7.1c-.02-2.31 1.9-4.32 4.14-4.43.21 2.51-2.16 4.67-4.14 4.43z"></path>
</svg>
<span>Continue with Apple</span>
</button>
<button class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 py-4 rounded-lg font-semibold active:bg-slate-50 dark:active:bg-slate-700 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="flex-grow h-px bg-slate-200 dark:bg-slate-800"></div>
<span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Or continue with email</span>
<div class="flex-grow h-px bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Form Section -->
<div class="space-y-5">
<div class="space-y-2">
<label class="text-sm font-semibold ml-1 text-slate-700 dark:text-slate-300" for="email">Email address</label>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800 border-0 ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary rounded-lg py-4 px-4 transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800 border-0 ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary rounded-lg py-4 px-4 transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-icons text-xl">visibility_off</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-semibold text-primary active:opacity-60 transition-opacity" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full bg-primary text-white py-4 rounded-lg font-bold text-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-all mt-4">
                Sign In
            </button>
</div>
<!-- Footer -->
<div class="mt-auto pt-10 text-center safe-area-bottom">
<p class="text-slate-500 dark:text-slate-400 font-medium">
                New to TripOS? <a class="text-primary font-bold active:opacity-60 transition-opacity" href="#">Create an account</a>
</p>
</div>
</main>
<!-- Decoration / Abstract Image Placeholder -->
<div class="fixed top-0 right-0 -z-10 opacity-5 dark:opacity-10 pointer-events-none">
<div class="w-96 h-96 bg-primary rounded-full blur-[100px] -mr-48 -mt-48"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-5 dark:opacity-10 pointer-events-none">
<div class="w-96 h-96 bg-primary rounded-full blur-[100px] -ml-48 -mb-48"></div>
</div>
</body></html>
