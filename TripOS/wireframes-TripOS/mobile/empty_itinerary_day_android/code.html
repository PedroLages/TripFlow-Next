<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripOS - Empty Itinerary Day</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d4fd7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111521",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Phone Container Simulator -->
<div class="max-w-[430px] mx-auto min-h-screen bg-background-light dark:bg-background-dark flex flex-col relative overflow-hidden shadow-2xl">
<!-- Status Bar Space (iOS Style) -->
<div class="h-12 w-full flex justify-between items-center px-8 pt-4 pb-2">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons-round text-[18px]">signal_cellular_alt</span>
<span class="material-icons-round text-[18px]">wifi</span>
<span class="material-icons-round text-[18px]">battery_full</span>
</div>
</div>
<!-- Top App Bar -->
<header class="px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-icons-round text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Summer Trip to Tokyo</h1>
</div>
<div class="flex gap-1">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-icons-round text-slate-600 dark:text-slate-400">group_add</span>
</button>
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-icons-round text-slate-600 dark:text-slate-400">more_vert</span>
</button>
</div>
</header>
<!-- Horizontal Day Selector (Material 3 Style) -->
<nav class="mt-2 overflow-x-auto hide-scrollbar px-6 flex gap-3 pb-4">
<!-- Active Day -->
<button class="flex-shrink-0 flex flex-col items-center gap-1 group">
<div class="bg-primary text-white h-12 w-12 rounded-full flex items-center justify-center font-bold text-sm shadow-lg shadow-primary/30">
                    D1
                </div>
<span class="text-xs font-semibold text-primary">Day 1</span>
</button>
<!-- Other Days -->
<button class="flex-shrink-0 flex flex-col items-center gap-1 group">
<div class="bg-primary/10 dark:bg-primary/5 text-slate-500 h-12 w-12 rounded-full flex items-center justify-center font-bold text-sm hover:bg-primary/20 transition-all">
                    D2
                </div>
<span class="text-xs font-medium text-slate-400">Day 2</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-1 group">
<div class="bg-primary/10 dark:bg-primary/5 text-slate-500 h-12 w-12 rounded-full flex items-center justify-center font-bold text-sm hover:bg-primary/20 transition-all">
                    D3
                </div>
<span class="text-xs font-medium text-slate-400">Day 3</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-1 group">
<div class="bg-primary/10 dark:bg-primary/5 text-slate-500 h-12 w-12 rounded-full flex items-center justify-center font-bold text-sm hover:bg-primary/20 transition-all">
                    D4
                </div>
<span class="text-xs font-medium text-slate-400">Day 4</span>
</button>
<button class="flex-shrink-0 flex flex-col items-center gap-1 group">
<div class="bg-slate-200 dark:bg-slate-800 text-slate-400 h-12 w-12 rounded-full flex items-center justify-center transition-all">
<span class="material-icons-round text-lg">add</span>
</div>
<span class="text-xs font-medium text-slate-400 opacity-0">Add</span>
</button>
</nav>
<!-- Main Content Area / Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-32">
<div class="w-full max-w-sm aspect-square border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl flex flex-col items-center justify-center text-center p-8 bg-white/40 dark:bg-slate-800/20 backdrop-blur-sm">
<!-- Icon -->
<div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6">
<span class="material-icons-round text-4xl text-slate-400">event_available</span>
</div>
<!-- Text Content -->
<h2 class="text-xl font-bold text-slate-800 dark:text-slate-200 mb-2">No activities for Day 1</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-8 leading-relaxed">
                    The canvas is empty! Start planning your first day of adventure with your group.
                </p>
<!-- Action Button -->
<button class="flex items-center gap-2 px-6 py-3 rounded-full border-2 border-primary text-primary font-bold hover:bg-primary/5 active:scale-95 transition-all">
<span class="material-icons-round text-[20px]">add_circle_outline</span>
<span>Add Activity</span>
</button>
</div>
<!-- Collaboration Hint -->
<div class="mt-8 flex items-center gap-2 bg-slate-200/50 dark:bg-slate-800/50 px-4 py-2 rounded-full">
<div class="flex -space-x-2">
<img alt="Avatar" class="w-6 h-6 rounded-full border-2 border-background-light dark:border-background-dark" data-alt="User avatar profile picture circular" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwiE5rr7SJEG4cP8m-cYY0dsyA59yKoa8UC9GAk7Gi3W3yFhl_ZotlMasHmko61WSLExCOQWqxq6aTm9sNaYEkjas3GqCUdu0GwM_4OV23nFZTnoCEOioRXS1_ayTsUmYo7wRNJtgPQ7D_jZ8AckPiM3mfHVMAzF1UbTSaR9v60Cf9hs0tNJCCYOe-hnBIQWdLVWxjmvT5DFOt4CDz5tLPDD5Xcmwp6xd6ZPA3QawwM7_o3cpfaU3N26PqVA3VtOBpXuv2vUjRFKk"/>
<img alt="Avatar" class="w-6 h-6 rounded-full border-2 border-background-light dark:border-background-dark" data-alt="Friend avatar profile picture circular" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDE_ek6k5L5ZeBCvC2zo9UN1hkhkLto31JJGr3O5z1jpQMBbV3nEGqCCJa6erWgFiSRkSHLsbGAQ03OaMVAY_uvMnG35El4Gjq38oa4jVSNssDojjQGKgRGHGhEZuR4j6EdJWR-b3tUc3VQBxogkvtr4dqOkDhYPiW7qQe0Xf1DDjytQgMRJeEqAVHT0c9LYTHHVdfR3ii-ZzdlcKHesh4cE13oG5PwldhhoybP4H6O0xWsWm8HYiBWaku2MjuCZGP1LfV0CmGxU-M"/>
</div>
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Waiting for group ideas...</span>
</div>
</main>
<!-- Floating Action Button (FAB) -->
<button class="absolute bottom-24 right-6 w-14 h-14 bg-primary text-white rounded-xl shadow-xl shadow-primary/40 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-10">
<span class="material-icons-round text-3xl">add</span>
</button>
<!-- Bottom Navigation (Material 3 Style) -->
<footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 pt-3 pb-8 flex justify-between items-center z-20">
<button class="flex flex-col items-center gap-1 group">
<div class="px-5 py-1 rounded-full bg-primary/10 text-primary transition-all">
<span class="material-icons-round">calendar_today</span>
</div>
<span class="text-[10px] font-bold text-primary">Itinerary</span>
</button>
<button class="flex flex-col items-center gap-1 group text-slate-500 dark:text-slate-400">
<div class="px-5 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round">map</span>
</div>
<span class="text-[10px] font-medium">Map</span>
</button>
<button class="flex flex-col items-center gap-1 group text-slate-500 dark:text-slate-400">
<div class="px-5 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round">payments</span>
</div>
<span class="text-[10px] font-medium">Expenses</span>
</button>
<button class="flex flex-col items-center gap-1 group text-slate-500 dark:text-slate-400">
<div class="px-5 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-round">forum</span>
</div>
<span class="text-[10px] font-medium">Chat</span>
</button>
</footer>
<!-- iPhone Notch/Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
